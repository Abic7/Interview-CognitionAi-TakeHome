<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devin Orchestrator Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .metric-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        .metric-card h3 {
            color: #667eea;
            font-size: 0.9em;
            text-transform: uppercase;
            margin-bottom: 10px;
            opacity: 0.7;
        }

        .metric-card .value {
            font-size: 2.5em;
            font-weight: bold;
            color: #333;
        }

        .metric-card .status {
            margin-top: 10px;
            font-size: 0.9em;
            padding: 8px;
            border-radius: 5px;
            background: #f0f0f0;
            color: #666;
        }

        .findings {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .findings-header {
            background: #667eea;
            color: white;
            padding: 20px;
            font-size: 1.3em;
            font-weight: bold;
        }

        .finding-item {
            border-bottom: 1px solid #eee;
            padding: 20px;
            transition: background 0.2s;
        }

        .finding-item:last-child {
            border-bottom: none;
        }

        .finding-item:hover {
            background: #f9f9f9;
        }

        .finding-issue {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .finding-number {
            background: #667eea;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2em;
            flex-shrink: 0;
        }

        .finding-title {
            flex-grow: 1;
            margin-left: 15px;
            font-weight: 500;
            color: #333;
        }

        .finding-status {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-in_progress {
            background: #fff3cd;
            color: #856404;
        }

        .status-pr_opened {
            background: #d4edda;
            color: #155724;
        }

        .status-completed {
            background: #d1ecf1;
            color: #0c5460;
        }

        .finding-details {
            margin-top: 10px;
            font-size: 0.9em;
            color: #666;
        }

        .finding-pr {
            margin-top: 10px;
        }

        .finding-pr a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .finding-pr a:hover {
            text-decoration: underline;
        }

        .refresh-info {
            text-align: center;
            color: white;
            margin-top: 20px;
            font-size: 0.9em;
            opacity: 0.8;
        }

        .loading {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: white;
            margin-right: 5px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Devin Orchestrator</h1>
            <p>Autonomous remediation automation</p>
        </div>

        <div id="error" class="error" style="display: none;"></div>

        <div class="metrics">
            <div class="metric-card">
                <h3>Total Issues</h3>
                <div class="value" id="total-issues">-</div>
            </div>
            <div class="metric-card">
                <h3>PRs Completed</h3>
                <div class="value" id="prs-completed">-</div>
            </div>
            <div class="metric-card">
                <h3>Status</h3>
                <div class="status" id="status">-</div>
            </div>
        </div>

        <div class="findings">
            <div class="findings-header">Issues & PRs</div>
            <div id="findings-list"></div>
        </div>

        <div class="refresh-info">
            <span class="loading"></span>
            Last updated: <span id="last-update">-</span> | Refreshing every 5 seconds
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8001';

        async function fetchData() {
            try {
                const findingsRes = await fetch(`${API_BASE}/api/findings`);
                const metricsRes = await fetch(`${API_BASE}/api/metrics`);

                if (!findingsRes.ok || !metricsRes.ok) {
                    throw new Error(`API error: ${findingsRes.status}, ${metricsRes.status}`);
                }

                const findings = await findingsRes.json();
                const metrics = await metricsRes.json();

                updateMetrics(metrics);
                updateFindings(findings);
                clearError();
            } catch (error) {
                showError(`Connection error: ${error.message}`);
            }

            updateTimestamp();
        }

        function updateMetrics(metrics) {
            document.getElementById('total-issues').textContent = metrics.total_issues || 0;
            document.getElementById('prs-completed').textContent = metrics.prs_completed || 0;
            document.getElementById('status').textContent = (metrics.status || 'unknown').toUpperCase();
        }

        function updateFindings(findings) {
            const list = document.getElementById('findings-list');
            list.innerHTML = '';

            if (!findings || findings.length === 0) {
                list.innerHTML = '<div class="finding-item">No issues yet</div>';
                return;
            }

            findings.forEach(finding => {
                const item = document.createElement('div');
                item.className = 'finding-item';

                const statusClass = `status-${finding.status}`;

                let prHtml = '';
                if (finding.pr_url) {
                    prHtml = `<div class="finding-pr">
                        <a href="${finding.pr_url}" target="_blank">→ View PR on GitHub</a>
                    </div>`;
                }

                item.innerHTML = `
                    <div class="finding-issue">
                        <div style="display: flex; align-items: center; flex-grow: 1;">
                            <div class="finding-number">#${finding.issue_num}</div>
                            <div class="finding-title">${finding.title || `Issue ${finding.issue_num}`}</div>
                        </div>
                        <div class="finding-status ${statusClass}">${finding.status.replace('_', ' ')}</div>
                    </div>
                    <div class="finding-details">
                        Created: ${new Date(finding.created_at).toLocaleString()}
                    </div>
                    ${prHtml}
                `;

                list.appendChild(item);
            });
        }

        function updateTimestamp() {
            const now = new Date();
            document.getElementById('last-update').textContent = now.toLocaleTimeString();
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        function clearError() {
            document.getElementById('error').style.display = 'none';
        }

        // Fetch data immediately and then every 5 seconds
        fetchData();
        setInterval(fetchData, 5000);
    </script>
</body>
</html>
